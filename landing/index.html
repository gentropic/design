<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoscientifical Chaos Union</title>
    <link rel="icon" type="image/svg+xml" href="../brand/gcu-favicon-32.svg">

    <!-- GCU design system (switchboard) + its typefaces -->
    <link rel="stylesheet" href="../system/switchboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Space+Mono&display=swap">

    <style>
        /* Brand accent — copper (the GCU stereonet hue), layered over switchboard via
           its per-app token-override mechanism. switchboard supplies the surfaces,
           type, and motion; copper is the landing's one brand colour. */
        :root { --brand-copper: #b87333; --brand-copper-bright: #d4894a; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--au-surface);
            color: var(--au-fg-muted);
            font-family: var(--au-font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Background stereonet (bearing.js; copper, faint) ── */
        .stereonet-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            transition: opacity 1s ease-in;
        }
        .stereonet-bg.loaded { opacity: 0.07; }
        .stereonet-bg svg { width: 100%; height: 100%; }
        .stereonet-bg svg > circle:first-child { fill: transparent !important; }
        .stereonet-bg svg path { stroke: var(--brand-copper) !important; }
        .stereonet-bg svg > circle:last-of-type { stroke: var(--brand-copper) !important; fill: none !important; }
        .stereonet-bg svg text { display: none !important; }

        /* ── Main content ── */
        .content { position: relative; z-index: 1; text-align: center; padding: 2rem; }
        .logo { width: 160px; height: 160px; margin-bottom: 2rem; }

        h1 {
            font-family: var(--au-font-sans);
            font-weight: 600;
            font-size: 2.5rem;
            color: var(--brand-copper);
            margin-bottom: 0.5rem;
            letter-spacing: 0.01em;
        }

        .tagline { font-size: 1.1rem; color: var(--au-fg-soft); margin-bottom: 3rem; }

        .links { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
        .links a {
            color: var(--au-fg-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color var(--au-dur) var(--au-ease);
        }
        .links a:hover { color: var(--brand-copper-bright); }

        /* ── Footer — the motto, set in the machine face (mono) ── */
        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            font-family: var(--au-font-mono);
            color: var(--au-fg-soft);
        }
        footer a { color: var(--au-fg-soft); text-decoration: none; }
        footer a:hover { color: var(--brand-copper); }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .logo { width: 120px; height: 120px; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="stereonet-bg" id="bg-container"></div>

    <main class="content">
        <img src="../brand/gcu-logo-icon.svg" alt="GCU" class="logo">
        <h1>Geoscientifical Chaos Union</h1>
        <p class="tagline">Computational geoscience tools</p>
        <nav class="links">
            <a href="https://github.com/gentropic">GitHub</a>
            <a href="https://www.npmjs.com/org/gcu">npm</a>
            <a href="mailto:endarthur@gmail.com">Contact</a>
        </nav>
    </main>

    <footer>
        <a href="#" title="Computatro et Malleo">Computatro et Malleo</a>
    </footer>

    <script src="https://unpkg.com/@gcu/bearing/dist/bearing.min.js"></script>
    <script>
        // ============================================================
        // ASTRONOMICAL BACKGROUND STEREONET
        // Rotates in real time with Earth — one full turn per day,
        // tilted by the sun's current declination. Reference: São Paulo.
        // ============================================================
        const DEG = Math.PI / 180;
        const LON = -46.63;
        const AXIAL_TILT = 23.44;

        const bgNet = new bearing.Stereonet({ size: 600, projection: 'equal-area' });
        const bgContainer = document.getElementById('bg-container');
        bgContainer.appendChild(bgNet.element());

        function getAstroParams() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 0);
            const dayOfYear = (now - startOfYear) / (1000 * 60 * 60 * 24);
            const sunDeclination = AXIAL_TILT * Math.sin((360 / 365) * (dayOfYear - 81) * DEG);
            const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60
                           + now.getUTCSeconds() / 3600 + now.getMilliseconds() / 3600000;
            const solarTime = utcHours + LON / 15;
            const rotationAngle = ((solarTime / 24) * 360 + 360) % 360;
            return { rotationAngle, sunDeclination };
        }

        function updateBg() {
            const { rotationAngle, sunDeclination } = getAstroParams();
            const plunge = 45 + sunDeclination;
            bgNet.setCenter(rotationAngle, plunge).render();
        }

        updateBg();
        requestAnimationFrame(function () { bgContainer.classList.add('loaded'); });
        setInterval(updateBg, 1000);
    </script>
</body>
</html>
