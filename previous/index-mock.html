<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoscientifical Chaos Union</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #ccc;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Stereonet background container */
        .stereonet-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            opacity: 0.07;
            pointer-events: none;
        }

        .stereonet-bg svg {
            width: 100%;
            height: 100%;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 160px;
            height: 160px;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Latin Modern Roman', 'CMU Serif', 'STIX Two Text', Georgia, serif;
            font-size: 2.5rem;
            font-weight: normal;
            color: #b87333;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .tagline {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 3rem;
        }

        .status {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #b87333;
        }

        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: #444;
        }

        footer a {
            color: #555;
            text-decoration: none;
        }

        footer a:hover {
            color: #b87333;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .logo { width: 120px; height: 120px; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="stereonet-bg">
        <svg id="stereonet" viewBox="-150 -150 300 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Generated by JavaScript -->
        </svg>
    </div>

    <main class="content">
        <img src="gcu-logo-icon.svg" alt="GCU" class="logo">
        <h1>Geoscientifical Chaos Union</h1>
        <p class="tagline">Computational geoscience tools</p>
        <p class="status">Coming soon</p>
        <nav class="links">
            <a href="https://github.com/gentropic">GitHub</a>
            <a href="mailto:endarthur@gmail.com">Contact</a>
        </nav>
    </main>

    <footer>
        <a href="#" title="Computatro et Malleo">By computer and hammer</a>
    </footer>

    <script>
        // ============================================================
        // CONFIGURATION - Adjust these parameters to tune the stereonet
        // ============================================================

        const CONFIG = {
            // Reference location
            location: {
                name: 'São Paulo',
                lat: -23.55,        // degrees (negative = south)
                lon: -46.63,        // degrees (negative = west)
            },

            // Earth parameters
            earth: {
                axialTilt: 23.44,   // obliquity in degrees
            },

            // View settings
            view: {
                primitiveRadius: 100,   // radius of primitive circle in SVG units
                // What astronomical frame are we showing?
                // Options: 'sun-centered', 'zenith', 'horizon'
                frame: 'sun-centered',
            },

            // Grid density
            grid: {
                latitudeStep: 20,   // degrees between latitude lines
                longitudeStep: 30,  // degrees between longitude lines
                latitudeRange: 80,  // max latitude to draw (±)
            },

            // Features to display
            show: {
                latitudeLines: true,
                longitudeLines: true,
                equator: true,
                tropics: true,
                terminator: true,
                primitiveCircle: true,
            },

            // Visual styling
            style: {
                strokeColor: '#b87333',
                strokeWidth: 0.4,
                opacity: 0.07,          // background opacity
            },

            // Animation
            animation: {
                updateInterval: 1000,   // ms between updates (1000 = 1 second)
            },
        };

        // ============================================================
        // CONSTANTS (derived from config)
        // ============================================================

        const DEG = Math.PI / 180;
        const PRIMITIVE_RADIUS = CONFIG.view.primitiveRadius;

        // Stereographic projection: project a point on unit sphere to plane
        // Using lower hemisphere projection
        function stereoProject(plunge, trend) {
            // plunge: angle from horizontal (positive down)
            // trend: azimuth from north (clockwise)
            const r = PRIMITIVE_RADIUS * Math.tan((90 - Math.abs(plunge)) * DEG / 2);
            const theta = (90 - trend) * DEG; // convert to math angle
            return {
                x: r * Math.cos(theta),
                y: -r * Math.sin(theta)
            };
        }

        // Project a great circle (plane with given pole)
        function greatCirclePath(polePlunge, poleTrend, numPoints = 72) {
            const points = [];

            // Generate points along the great circle
            for (let i = 0; i <= numPoints; i++) {
                const angle = (i / numPoints) * 360;

                // Point on great circle perpendicular to pole
                // Rotate around the pole direction
                const poleP = polePlunge * DEG;
                const poleT = poleTrend * DEG;

                // Pole vector
                const px = Math.cos(poleP) * Math.sin(poleT);
                const py = Math.cos(poleP) * Math.cos(poleT);
                const pz = -Math.sin(poleP);

                // Create orthonormal basis
                // Find a vector perpendicular to pole
                let ux, uy, uz;
                if (Math.abs(pz) < 0.9) {
                    // Cross with Z axis
                    ux = -py;
                    uy = px;
                    uz = 0;
                } else {
                    // Cross with X axis
                    ux = 0;
                    uy = pz;
                    uz = -py;
                }
                const uLen = Math.sqrt(ux*ux + uy*uy + uz*uz);
                ux /= uLen; uy /= uLen; uz /= uLen;

                // Second perpendicular vector (cross pole with u)
                const vx = py * uz - pz * uy;
                const vy = pz * ux - px * uz;
                const vz = px * uy - py * ux;

                // Point on great circle
                const a = angle * DEG;
                const qx = Math.cos(a) * ux + Math.sin(a) * vx;
                const qy = Math.cos(a) * uy + Math.sin(a) * vy;
                const qz = Math.cos(a) * uz + Math.sin(a) * vz;

                // Only plot lower hemisphere (qz <= 0)
                if (qz <= 0.001) {
                    // Convert to plunge/trend
                    const plunge = -Math.asin(qz) / DEG;
                    const trend = Math.atan2(qx, qy) / DEG;
                    const pt = stereoProject(plunge, trend);
                    points.push(pt);
                } else {
                    points.push(null); // break in path
                }
            }

            return points;
        }

        // Project a small circle (cone around an axis)
        function smallCirclePath(axisPlunge, axisTrend, halfAngle, numPoints = 72) {
            const points = [];

            const axP = axisPlunge * DEG;
            const axT = axisTrend * DEG;
            const ha = halfAngle * DEG;

            // Axis vector
            const ax = Math.cos(axP) * Math.sin(axT);
            const ay = Math.cos(axP) * Math.cos(axT);
            const az = -Math.sin(axP);

            // Create orthonormal basis perpendicular to axis
            let ux, uy, uz;
            if (Math.abs(az) < 0.9) {
                ux = -ay; uy = ax; uz = 0;
            } else {
                ux = 0; uy = az; uz = -ay;
            }
            const uLen = Math.sqrt(ux*ux + uy*uy + uz*uz);
            ux /= uLen; uy /= uLen; uz /= uLen;

            const vx = ay * uz - az * uy;
            const vy = az * ux - ax * uz;
            const vz = ax * uy - ay * ux;

            for (let i = 0; i <= numPoints; i++) {
                const angle = (i / numPoints) * 360 * DEG;

                // Point on cone
                const cosHA = Math.cos(ha);
                const sinHA = Math.sin(ha);
                const qx = cosHA * ax + sinHA * (Math.cos(angle) * ux + Math.sin(angle) * vx);
                const qy = cosHA * ay + sinHA * (Math.cos(angle) * uy + Math.sin(angle) * vy);
                const qz = cosHA * az + sinHA * (Math.cos(angle) * uz + Math.sin(angle) * vz);

                if (qz <= 0.001) {
                    const plunge = -Math.asin(Math.max(-1, Math.min(1, qz))) / DEG;
                    const trend = Math.atan2(qx, qy) / DEG;
                    const pt = stereoProject(plunge, trend);
                    points.push(pt);
                } else {
                    points.push(null);
                }
            }

            return points;
        }

        // Convert points array to SVG path
        function pointsToPath(points) {
            let d = '';
            let inPath = false;

            for (const pt of points) {
                if (pt === null) {
                    inPath = false;
                } else if (!inPath) {
                    d += `M ${pt.x.toFixed(2)} ${pt.y.toFixed(2)} `;
                    inPath = true;
                } else {
                    d += `L ${pt.x.toFixed(2)} ${pt.y.toFixed(2)} `;
                }
            }

            return d;
        }

        // ============================================================
        // ASTRONOMICAL CALCULATIONS
        // ============================================================

        // Calculate real-time astronomical parameters
        function getAstronomicalParams() {
            const now = new Date();
            const { lat, lon } = CONFIG.location;
            const { axialTilt } = CONFIG.earth;

            // Day of year (0-365, fractional)
            const startOfYear = new Date(now.getFullYear(), 0, 0);
            const diff = now - startOfYear;
            const dayOfYear = diff / (1000 * 60 * 60 * 24);

            // Sun's declination based on day of year
            // Approximation: declination = axialTilt * sin((360/365) * (dayOfYear - 81))
            // Day 81 = March 22 (approx spring equinox in northern hemisphere)
            const sunDeclination = axialTilt * Math.sin((360 / 365) * (dayOfYear - 81) * DEG);

            // Current rotation angle based on time
            // Earth rotates 360° in ~24 hours (using solar day)
            // At solar noon at reference longitude, that meridian faces the sun

            // Get current UTC time as fraction of day
            const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600 + now.getMilliseconds() / 3600000;

            // Solar time at reference location (approximate - ignoring equation of time)
            // Longitude in hours offset from UTC: lon / 15
            const solarTime = utcHours + lon / 15; // hours from solar midnight
            const rotationAngle = (solarTime / 24) * 360; // degrees

            return { sunDeclination, rotationAngle, dayOfYear, solarTime };
        }

        // ============================================================
        // STEREONET GENERATION
        // ============================================================

        function generateStereonet() {
            const svg = document.getElementById('stereonet');
            const { sunDeclination, rotationAngle } = getAstronomicalParams();
            const { axialTilt } = CONFIG.earth;
            const { latitudeStep, longitudeStep, latitudeRange } = CONFIG.grid;
            const { strokeColor, strokeWidth } = CONFIG.style;

            const paths = [];

            // Latitude lines (small circles around Earth's tilted axis)
            if (CONFIG.show.latitudeLines) {
                for (let lat = -latitudeRange; lat <= latitudeRange; lat += latitudeStep) {
                    if (lat === 0) continue; // equator handled separately
                    const halfAngle = 90 - Math.abs(lat);
                    const axisPlunge = 90 - sunDeclination;
                    const pts = smallCirclePath(axisPlunge, 0, halfAngle);
                    paths.push(pointsToPath(pts));
                }
            }

            // Longitude lines (great circles through the poles)
            if (CONFIG.show.longitudeLines) {
                for (let lon = 0; lon < 180; lon += longitudeStep) {
                    const adjustedLon = lon + rotationAngle;
                    const pts = greatCirclePath(sunDeclination, adjustedLon);
                    paths.push(pointsToPath(pts));
                }
            }

            // Equator (great circle perpendicular to Earth's axis)
            if (CONFIG.show.equator) {
                const eqPts = greatCirclePath(90 - sunDeclination, 0);
                paths.push(pointsToPath(eqPts));
            }

            // Tropics (small circles at ± axial tilt)
            if (CONFIG.show.tropics) {
                const tropicN = smallCirclePath(90 - sunDeclination, 0, 90 - axialTilt);
                const tropicS = smallCirclePath(90 - sunDeclination, 0, 90 + axialTilt);
                paths.push(pointsToPath(tropicN));
                paths.push(pointsToPath(tropicS));
            }

            // Terminator (day/night boundary great circle)
            if (CONFIG.show.terminator) {
                const terminatorPts = greatCirclePath(0, rotationAngle + 90);
                paths.push(pointsToPath(terminatorPts));
            }

            // Primitive circle
            let primitiveD = '';
            if (CONFIG.show.primitiveCircle) {
                primitiveD = `<path d="M ${PRIMITIVE_RADIUS} 0 A ${PRIMITIVE_RADIUS} ${PRIMITIVE_RADIUS} 0 1 1 ${-PRIMITIVE_RADIUS} 0 A ${PRIMITIVE_RADIUS} ${PRIMITIVE_RADIUS} 0 1 1 ${PRIMITIVE_RADIUS} 0"/>`;
            }

            // Build SVG content
            svg.innerHTML = `
                <g stroke="${strokeColor}" fill="none" stroke-width="${strokeWidth}">
                    ${primitiveD}
                    ${paths.map(d => `<path d="${d}"/>`).join('\n')}
                </g>
            `;
        }

        // ============================================================
        // ANIMATION LOOP
        // ============================================================

        let lastUpdate = 0;

        function animate(timestamp) {
            // Throttle updates based on config interval
            if (timestamp - lastUpdate >= CONFIG.animation.updateInterval) {
                generateStereonet();
                lastUpdate = timestamp;
            }
            requestAnimationFrame(animate);
        }

        // Start animation
        requestAnimationFrame(animate);
    </script>
</body>
</html>
